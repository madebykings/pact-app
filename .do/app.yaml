name: pact-app

jobs:
  - name: send-reminders
    kind: CRON
    schedule: "*/30 * * * *"
    run_command: >
      curl -sf
      "${APP_URL}/api/cron/send-reminders?secret=${CRON_SECRET}"
      || true
    envs:
      - key: APP_URL
        scope: RUN_TIME
      - key: CRON_SECRET
        scope: RUN_TIME

  - name: generate-week
    kind: CRON
    schedule: "0 6 * * 1"
    run_command: >
      curl -sf
      "${APP_URL}/api/cron/generate-week?secret=${CRON_SECRET}"
      || true
    envs:
      - key: APP_URL
        scope: RUN_TIME
      - key: CRON_SECRET
        scope: RUN_TIME
